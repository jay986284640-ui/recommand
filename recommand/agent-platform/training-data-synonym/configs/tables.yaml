# 业务表字段契约 v1.3
# 设计原则:
#   1. 只声明 pipeline 真正读到的列 + sensitive 列
#   2. 不做跨表 JOIN(由上游 SQL 视图解决)
#   3. _meta.field_contract 声明每种 role 必须提供的字段
#   4. _meta.llm_inference 声明 LLM 推断维度(新增维度只改这里)
#   5. 每张表的 derived_fields 声明非 LLM 字段来源(单列映射)

_meta:
  version: 1.3
  spec_version: v2.5.2
  format: table_meta_v1

  llm_inference:
    - field: category
      desc: 根据门店名称和品类推断商品所属的品类,如咖啡、快餐、奶茶、火锅、便利店
      multiple: false
    - field: taste
      desc: 根据门店类型和菜品特征推断口味标签(可多选),如甜、辣、清淡、酱香、烟熏
      multiple: true
    - field: cuisine
      desc: 推断门店的菜系类型,如川菜、粤菜、日料、西餐、烧烤、小吃
      multiple: false
    - field: occasion
      desc: 推断该门店适合的消费场景,如早餐、下午茶、聚会、外卖
      multiple: false
    - field: consumable_type
      desc: 推断是吃的还是喝的,如food、drink、mixed
      multiple: false

  field_contract:
    meituan_shop:
      required: [id, name, category, price, lng, lat]
      optional: [alt_price, city, district]
    self_shop:
      required: [id, name, brand]
      optional: [alt_price]
    coupon:
      required: [id, name, desc]
      optional: [face]

tables:
  - db: recommand_workspace
    name: o2o_new_gut_shop_base_third
    role: meituan_shop
    columns:
      - { name: str_id,            type: VARCHAR,  role: id }
      - { name: str_nm,            type: VARCHAR,  role: name }
      - { name: cat_nm,            type: VARCHAR,  role: category }
      - { name: avg_prc,           type: VARCHAR,  role: price }
      - { name: mnt_pern_usr_num,  type: VARCHAR,  role: alt_price }
      - { name: city_nm,           type: VARCHAR,  role: city }
      - { name: cnty_nm,           type: VARCHAR,  role: district }
      - { name: lng,               type: VARCHAR,  role: lng }
      - { name: lat,               type: VARCHAR,  role: lat }
    derived_fields:
      avg_prc: avg_prc
    sensitive: [crt_psn_id, updt_psn_id]

  - db: recommand_workspace
    name: o2o_new_gut_shop_base
    role: self_shop
    derived_fields:
      avg_prc: mnt_pern_usr_num
    columns:
      - { name: shopid,            type: VARCHAR,  role: id }
      - { name: shopname,          type: VARCHAR,  role: name }
      - { name: brnd_nm,           type: VARCHAR,  role: brand }
    sensitive: [opr_psn_id]

  - db: recommand_workspace
    name: o2o_new_gut_coupon_template
    role: coupon
    columns:
      - { name: couponid,           type: BIGINT,   role: id }
      - { name: couponname,         type: VARCHAR,  role: name }
      - { name: productdesc,        type: VARCHAR,  role: desc }
      - { name: ruledescription,    type: VARCHAR,  role: desc }
    derived_fields:
      avg_prc: faceprice
    sensitive: [creator, updateperson]
