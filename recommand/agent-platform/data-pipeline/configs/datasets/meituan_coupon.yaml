# 优惠推荐 Agent 数据管线 - 美团门店券示例配置
# 跑法:python run_pipeline.py --config configs/datasets/meituan_coupon.yaml

data:
  adapter: meituan_coupon
  adapter_config:
    trade_input: /data/meituan/trade.parquet
    store_input: /data/meituan/store.parquet
    template_input: /data/meituan/template.parquet
    cooccurrence_input: /data/meituan/co_occurrence.parquet

# 步骤 1: 数据质量稽核
audit:
  enabled: true
  output_dir: ./pipeline_output/audit
  # 自定义异常值稽核规则
  outlier_rules:
    - field: amount
      min: 0
      max: 10000

# 步骤 2: 数据清洗
cleaning:
  field_completeness: true
  required_fields: [user_id, item_id, timestamp]
  product_exists: true
  time: true
  years: 3                       # 只保留最近 3 年
  deduplicate: true
  kcore: true
  kcore_k: 5                     # 用户 / 商品至少 5 次交互
  burst_review: true
  burst_window_minutes: 10
  burst_max_reviews: 50
  outlier: true                  # 评分 / 时间戳异常
  spam: true                     # 营销引流 spam 模式
  text_length: true              # 文本长度
  min_text_length: 5

# 步骤 3: 数据标准化
normalization:
  enabled: true
  df_config:
    items:
      - normalizer: html_normalizer
        columns: [item_title, item_description]
      - normalizer: unicode_normalizer
        columns: [item_title, item_description]
      - normalizer: whitespace_normalizer
        columns: [item_title, item_description]
    interactions:
      - normalizer: html_normalizer
        columns: [review_text]
      - normalizer: lowercase
        columns: [review_text]

# 步骤 4: 特征提取
feature_extraction:
  enabled: true
  output_dir: ./pipeline_output/features
  output_format: parquet
  item_features: true
  user_features: true
  user_interaction_history: true
  co_purchase: true
  impression_log: false          # 暂留空,待 LP 主流程落盘 conversation_trace 后开启
  max_seq_length: 200
  co_purchase_window_days: 30
  new_user_threshold: 3

# 输出
output:
  dir: ./pipeline_output
  format: parquet

# Spark
spark:
  master: local[*]
  memory: 4g
  partitions: 8
