# Netflix 数据集配置文件

# 数据源配置
data:
  adapter: netflix              # 适配器名称
  adapter_config:
    combined_data_input:        # 交互数据输入路径（支持多文件列表）
      - "./datasets/Netflix/combined_data_1.txt"
      - "./datasets/Netflix/combined_data_2.txt"
      - "./datasets/Netflix/combined_data_3.txt"
      - "./datasets/Netflix/combined_data_4.txt"
    titles_input: "./datasets/Netflix/movie_titles.csv"  # 电影标题数据路径

# 交互信息清洗过滤配置
cleaning:
  # 字段完整性过滤
  field_completeness: true
  required_fields:
    - user_id
    - item_id
    - timestamp

  # 物品存在性过滤（需要 meta 数据）
  product_exists: true

  # 时间过滤（保留最近 N 年）
  time: true
  years: 20

  # 去重
  deduplicate: true
  dedup_column: ""  # 根据所有列去重

  # 用户-物品连续去重
  user_item_dedup: true

  # K-core 过滤
  kcore: true
  kcore_k: 5
  kcore_checkpoint_dir: "/tmp/checkpoint"  # checkpoint 目录，用于大数据集

  # =====================================================
  # 通用规则过滤 - 交互数据
  # 支持的算子: eq, neq, gt, gte, lt, lte, range
  #             length_lt, length_gt, length_eq, length_range
  #             contains, not_contains, startswith, endswith
  #             matches, not_matches (正则)
  #             is_in, not_in, is_null, is_not_empty
  # 逻辑: AND (所有条件都满足) 或 OR (任一条件满足)
  # =====================================================
  interaction_rules:
    # 评分范围过滤 (Netflix 评分 1-5)
    - field: rating
      operator: range
      min: 1
      max: 5

  interaction_rules_logic: "AND"  # AND 或 OR

  # 通用规则过滤 - 用户数据
  user_rules: []
  user_rules_logic: "AND"

  # 通用规则过滤 - 物品数据
  item_rules: []
  item_rules_logic: "AND"

# 文本标准化配置
normalization:
  enabled: true

  # 为不同 DataFrame 配置不同的 normalizer
  df_config:
    users: []  # 用户数据无需标准化
    items:
      - normalizer: lowercase
        columns:
          - item_title
      - normalizer: whitespace_normalizer
        columns:
          - item_title
    interactions: []

  # 正则替换规则配置
  regex_rules: []

  # 正则提取规则配置
  regex_extract_rules: []

# 输出配置
output:
  dir: ./output/netflix              # 输出目录
  format: json               # 输出格式: json | parquet | csv
  save_intermediate: false   # 是否保存 Adapter 输出的中间格式

# Spark 配置
spark:
  master: local[*]           # Spark master URL
  memory: 64g                 # driver 内存
  driver_cores: 32            # driver CPU 核心数
  executor_cores: 2          # executor CPU 核心数
  executor_memory: 12g        # executor 内存
  executor_numbers: 1        # executor 数量
  partitions: 32              # shuffle 分区数
  local_dir: /tmp            # shuffle 临时目录
  checkpoint_dir: "/tmp/checkpoint"         # checkpoint 存储目录